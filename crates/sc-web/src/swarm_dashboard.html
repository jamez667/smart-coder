<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>smart-coder swarm — live</title>
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --border:#30363d; --fg:#c9d1d9;
    --dim:#8b949e; --cyan:#39c5cf; --green:#3fb950; --red:#f85149; --magenta:#d2a8ff;
    --yellow:#d29922; --accent:#58a6ff;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
    font:13px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  header { padding:10px 16px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px;
    background:linear-gradient(90deg,#8957e522,transparent); }
  header .badge { background:var(--magenta); color:#08111a; font-weight:700;
    padding:3px 10px; border-radius:5px; }
  header .task { color:var(--fg); }
  header .status { margin-left:auto; font-weight:700; }
  main { padding:14px; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .box { background:var(--panel); border:1px solid var(--border); border-radius:8px;
    display:flex; flex-direction:column; overflow:hidden; }
  .box > h2 { margin:0; padding:8px 12px; font-size:12px; letter-spacing:.08em;
    text-transform:uppercase; color:var(--dim); border-bottom:1px solid var(--border); }
  .box .body { padding:8px 12px; overflow-y:auto; height:62vh; }

  /* task board */
  .sub { border-left:3px solid var(--border); padding:6px 0 6px 10px; margin:6px 0; }
  .sub .id { color:var(--accent); font-weight:700; }
  .sub .goal { color:var(--fg); }
  .sub .deps { color:var(--dim); }
  .sub.pending { border-color:var(--dim); }
  .sub.claimed { border-color:var(--cyan); }
  .sub.done { border-color:var(--green); }
  .sub.failed { border-color:var(--red); }
  .sub .badge2 { font-size:11px; padding:1px 6px; border-radius:4px; margin-left:6px; }
  .sub.pending .badge2 { background:#21262d; color:var(--dim); }
  .sub.claimed .badge2 { background:#10333a; color:var(--cyan); }
  .sub.done .badge2 { background:#0f2e1a; color:var(--green); }
  .sub.failed .badge2 { background:#3a1416; color:var(--red); }

  /* integration log */
  .line { white-space:pre-wrap; padding:2px 0; }
  .line.start { color:var(--cyan); }
  .line.finish { color:var(--dim); }
  .line.ok { color:var(--green); }
  .line.rej { color:var(--red); }
  .line.info { color:var(--magenta); }
  .line.done { color:var(--fg); font-weight:700; }

  footer { display:flex; gap:22px; padding:9px 16px; border-top:1px solid var(--border);
    background:var(--panel); position:sticky; bottom:0; }
  footer b { color:var(--fg); }
  footer .ok { color:var(--green); } footer .bad { color:var(--red); }
</style>
</head>
<body>
<header>
  <span class="badge">swarm</span>
  <span class="task" id="task">connecting…</span>
  <span class="status" id="status">●</span>
</header>
<main>
  <section class="box" id="board">
    <h2>task board</h2>
    <div class="body" id="board-body"><div class="line info">waiting for decomposition…</div></div>
  </section>
  <section class="box" id="log">
    <h2>orchestration</h2>
    <div class="body" id="log-body"></div>
  </section>
</main>
<footer>
  <span>subtasks <b id="total">0</b></span>
  <span>integrated <span class="ok" id="done">0</span></span>
  <span>rejected <span class="bad" id="failed">0</span></span>
  <span id="workers"></span>
</footer>

<script>
const $ = id => document.getElementById(id);
const boardBody = $('board-body');
const logBody = $('log-body');
// subtask id -> {goal, status, el}
const subs = new Map();
let counts = { total:0, done:0, failed:0 };

function renderBoard() {
  boardBody.innerHTML = '';
  for (const [id, s] of subs) {
    const d = document.createElement('div');
    d.className = 'sub ' + s.status;
    const badge = { pending:'PENDING', claimed:'RUNNING', done:'INTEGRATED', failed:'REJECTED' }[s.status];
    d.innerHTML = `<span class="id">${id}</span><span class="badge2">${badge}</span>`
      + `<div class="goal">${escapeHtml(s.goal)}</div>`;
    boardBody.appendChild(d);
  }
}
function escapeHtml(s){ const p=document.createElement('span'); p.textContent=s; return p.innerHTML; }

function log(cls, text) {
  const d = document.createElement('div'); d.className='line '+cls; d.textContent=text;
  logBody.appendChild(d);
  if (logBody.scrollHeight - logBody.scrollTop - logBody.clientHeight < 60)
    logBody.scrollTop = logBody.scrollHeight;
}
function refreshFooter(){
  $('total').textContent = counts.total;
  $('done').textContent = counts.done;
  $('failed').textContent = counts.failed;
}

function apply(e) {
  switch (e.type) {
    case 'Decomposed':
      counts.total = e.subtasks.length;
      // We only get goals here; ids come from WorkerStarted. Seed by index.
      e.subtasks.forEach((goal, i) => {
        const id = 't' + (i+1);
        if (![...subs.values()].some(s => s.goal === goal))
          subs.set(id, { goal, status:'pending' });
      });
      renderBoard();
      log('info', `● decomposed into ${e.subtasks.length} subtask(s)`);
      break;
    case 'WorkerStarted': {
      // Reconcile by goal so the real id replaces any seeded placeholder.
      let entry = [...subs.entries()].find(([,s]) => s.goal === e.goal);
      if (entry) { subs.delete(entry[0]); }
      subs.set(e.subtask, { goal:e.goal, status:'claimed' });
      renderBoard();
      log('start', `▸ worker started ${e.subtask}: ${e.goal}`);
      break;
    }
    case 'WorkerFinished':
      log('finish', `  · ${e.subtask} finished — ${e.summary}`);
      break;
    case 'Integrated': {
      const s = subs.get(e.subtask);
      if (s) { s.status = e.accepted ? 'done' : 'failed'; renderBoard(); }
      if (e.accepted) { counts.done++; log('ok', `  ✓ ${e.subtask} integrated: ${e.files.join(', ')}`); }
      else { counts.failed++; log('rej', `  ✗ ${e.subtask} rejected: ${e.files.join(' ')}`); }
      refreshFooter();
      break;
    }
    case 'SwarmDone': {
      const st = $('status');
      st.textContent = e.all_done ? '✔ all integrated' : `■ ${e.done} done, ${e.failed} failed`;
      st.style.color = e.all_done ? 'var(--green)' : 'var(--yellow)';
      log('done', `■ swarm done — ${e.done} integrated, ${e.failed} rejected`);
      break;
    }
  }
  refreshFooter();
}

let from = 0, done = false;
async function poll() {
  try {
    const res = await fetch('/events?from=' + from);
    const data = await res.json();
    if ($('task').textContent === 'connecting…' && data.events.length) $('task').textContent = 'running…';
    for (const e of data.events) apply(e);
    from = data.next; done = data.done;
  } catch (_) { done = true; }
  if (!done) setTimeout(poll, 300);
}
poll();
</script>
</body>
</html>
