<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bean &amp; Bloom</title>
  <link rel="stylesheet" href="styles.css">
  <script src="script.js" defer></script>
</head>
<body>
  <header>
    <nav>
      <div class="brand">Bean &amp; Bloom</div>
      <div class="nav-links">
        <a href="#home">Home</a>
        <a href="#menu">Menu</a>
        <a href="#contact">Contact</a>
      </div>
    </nav>
  </header>

  <main>
    <section id="home">
      <h1>Welcome to Bean &amp; Bloom</h1>
      <p class="tagline">Where every cup is a celebration of flavor and community.</p>
      <button id="cta">Order Now</button>
    </section>

    <section id="menu">
      <h2>Our Menu</h2>
      <ul>
        <li><span class="item-name">Espresso</span><span class="item-price">$3.50</span></li>
        <li><span class="item-name">Cappuccino</span><span class="item-price">$4.00</span></li>
        <li><span class="item-name">Latte</span><span class="item-price">$4.50</span></li>
        <li><span class="item-name">Matcha Latte</span><span class="item-price">$5.00</span></li>
      </ul>
    </section>

    <section id="contact">
      <h2>Contact Us</h2>
      <address>123 Coffee Lane, Brewtown, CA 90210</address>
      <form id="contact-form">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4"></textarea>
        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Bean &amp; Bloom. All rights reserved.</p>
  </footer>
</body>
</html>
